name: Release features

on:
  push:
    branches: [main]
    paths:
      - "src/**"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: devcontainers/action@v1
        with:
          publish-features: "true"
          base-path-to-features: "./src"
          generate-docs: "true"
        # devcontainers/action's post-publish repo git-tagging step calls
        # github.getOctokit(process.env.GITHUB_TOKEN || '') directly, so the
        # token must be exposed as a step env var. Passing it via `with: token:`
        # is silently dropped -- the action declares no such input.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
